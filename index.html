<body>
  <div class="wrap">
    <label class="theme-toggle" aria-label="Переключить тему">
      <input type="checkbox" id="themeToggle" class="theme-checkbox">
      <span class="theme-slider"></span>
    </label>
    <main class="card">
      <div class="avatar">
        <img src="images/banner_ds_Alukard.webp" alt="Аватар">
      </div>
      <h1 id="nickname">sttape</h1>
      <p class="handle">@sttape</p>

      <div class="links" aria-label="Links">
        <a class="link" target="_blank">

        <a class="link" target="_blank">

      <div class="player" role="region" aria-label="Музыкальный плеер">
        <button class="btn" id="playBtn" aria-label="Воспроизвести">
          ▶
        </button>
        <div class="progress">
          <div class="bar" id="progressBar" title="Перемотать">
            <div class="fill" id="progressFill"></div>

          <div class="time"><span id="current">0:00</span><span id="duration">0:00</span></div>
        </div>
        <div class="vol-container">
          <div class="vol" title="Громкость">
            <div class="vol-fill" id="volFill"></div>
            <input id="vol" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Громкость">
          </div>
          <span class="vol-label" id="volLabel">80%</span>
        </div>
      </div>

      <audio id="audio" src="media/dobrota.mp3"></audio>
